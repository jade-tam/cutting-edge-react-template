name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    name: Typecheck & Build CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  integration-test:
    name: Integration Test (Template Build)
    runs-on: ubuntu-latest
    needs: typecheck-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Create test project via CLI
        run: node dist/index.js test-app --pm pnpm

      - name: Install dependencies in generated project
        working-directory: test-app
        run: pnpm install

      - name: Build the generated template project
        working-directory: test-app
        run: pnpm run build
